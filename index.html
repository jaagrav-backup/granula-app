<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'" />
  <title>Audio Capture</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 10px;
      flex-shrink: 0;
      -webkit-app-region: drag;
    }

    #timer {
      font-size: 32px;
      font-weight: 200;
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
      color: #fff;
    }

    .controls {
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    button {
      padding: 8px 20px;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-app-region: no-drag;
    }

    button:active { transform: scale(0.96); }
    button:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    #startBtn { background: #e53935; color: #fff; }

    #stopBtn {
      background: #222;
      color: #ccc;
      border: 1px solid #333;
    }

    #clearBtn {
      background: transparent;
      color: #555;
      border: 1px solid #2a2a2a;
      padding: 8px 12px;
      font-size: 12px;
    }

    #clearBtn:hover { color: #888; border-color: #444; }

    /* ── Status ── */
    .status-row {
      padding: 0 18px 8px;
      flex-shrink: 0;
    }

    .status {
      font-size: 12px;
      color: #555;
      min-height: 16px;
    }

    .status.recording { color: #e53935; }
    .status.working   { color: #f5a623; }

    /* ── Transcript box ── */
    #transcriptBox {
      flex: 1;
      margin: 0 12px;
      background: #161616;
      border: 1px solid #222;
      border-radius: 10px;
      overflow-y: auto;
      padding: 14px 16px;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }

    #transcriptBox::-webkit-scrollbar { width: 4px; }
    #transcriptBox::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    #transcript {
      font-size: 14px;
      line-height: 1.65;
      color: #ddd;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #interim {
      color: #555;
      font-style: italic;
    }

    /* ── API key row ── */
    .key-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px 14px;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }

    .key-label {
      font-size: 11px;
      color: #444;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #apiKey {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #666;
      font-size: 11px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      padding: 5px 9px;
      outline: none;
      user-select: text;
      -webkit-user-select: text;
    }

    #apiKey:focus {
      border-color: #444;
      color: #999;
    }

    #apiKey::placeholder { color: #333; }

    /* ── Saved path ── */
    #saved {
      font-size: 10px;
      color: #3a3a3a;
      padding: 0 18px 4px;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>

  <!-- Top bar: timer + controls -->
  <div class="topbar">
    <div id="timer">00:00</div>
    <div class="controls">
      <button id="clearBtn">Clear</button>
      <button id="startBtn">● Record</button>
      <button id="stopBtn" disabled>■ Stop</button>
    </div>
  </div>

  <!-- Status line -->
  <div class="status-row">
    <p class="status" id="status">Ready</p>
  </div>

  <!-- Live transcript -->
  <div id="transcriptBox">
    <div id="transcript">
      <span id="interim"></span>
    </div>
  </div>

  <!-- File save path -->
  <p id="saved"></p>

  <!-- Deepgram API key -->
  <div class="key-row">
    <span class="key-label">Deepgram key</span>
    <input id="apiKey" type="password" placeholder="dg_…" spellcheck="false" autocomplete="off" />
  </div>

  <script src="renderer.js"></script>
</body>
</html>
